name: hei_penyu
description: Aplikasi jurnal refleksi diri berbasis suara dengan AI Peta Empati

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── UI ──
  cupertino_icons: ^1.0.6

  # ── State management ──
  flutter_riverpod: ^2.5.1

  # ── Database lokal (SQLite, type-safe) ──
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22    # SQLite native binary untuk iOS & Android
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Rekaman audio ──
  flutter_sound: ^9.2.13
  permission_handler: ^11.3.1

  # ── HTTP untuk AI API ──
  http: ^1.2.1

  # ── Utilities ──
  uuid: ^4.4.0                      # Generate UUID v4 untuk primary key

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code generation untuk Drift ──
  drift_dev: ^2.18.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  # File .env untuk development (jangan di-commit ke git!)
  # assets:
  #   - .env

# ─────────────────────────────────────────────
# CATATAN SETUP
# ─────────────────────────────────────────────
# 1. Generate kode Drift:
#      dart run build_runner build --delete-conflicting-outputs
#
# 2. iOS — tambahkan ke ios/Runner/Info.plist:
#      <key>NSMicrophoneUsageDescription</key>
#      <string>Hei Penyu butuh mikrofon untuk merekam jurnalmu</string>
#
# 3. Android — tambahkan ke android/app/src/main/AndroidManifest.xml:
#      <uses-permission android:name="android.permission.RECORD_AUDIO"/>
#
# 4. Build dengan API keys (JANGAN hardcode!):
#      flutter build apk \
#        --dart-define=OPENAI_KEY=sk-... \
#        --dart-define=ANTHROPIC_KEY=sk-ant-...
#
# 5. Untuk development, bisa pakai flutter_dotenv:
#      flutter run --dart-define=OPENAI_KEY=$(cat .env | grep OPENAI | cut -d= -f2)