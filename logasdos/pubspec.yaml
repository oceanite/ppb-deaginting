name: logasdos
description: Digital Assistant Logbook untuk Asisten Dosen
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase (Storage DIHAPUS - pakai path lokal / Cloudinary)
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  # firebase_storage: ^11.6.9   ← HAPUS, butuh Blaze plan berbayar

  # HTTP - dipakai jika pakai Cloudinary (Opsi 2)
  http: ^1.2.0

  # Local cache - SQLite (offline-first)
  sqflite: ^2.3.0
  path: ^1.9.0

  # Camera / Gallery
  image_picker: ^1.0.7

  # State management
  provider: ^6.1.2

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  path_provider: ^2.1.3
  connectivity_plus: ^5.0.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  #awesome_notifications: 0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true